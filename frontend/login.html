<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Car Flip Marketplace</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page-body">
    <div class="login-shell">
        <div class="login-card">
            <h1 class="login-title">Login</h1>
            <p class="login-subtitle">Enter any credentials to access the dashboard.</p>
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" name="username" autocomplete="username" placeholder="Username">
                </div>
                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="password" autocomplete="current-password" placeholder="Password">
                </div>
                <button type="submit" class="btn-search login-submit">Sign in</button>
            </form>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
