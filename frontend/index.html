<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Flip Marketplace</title>
    <style>
        :root {
			--bg-page: #f1f5f9; 
			--ui-white: #ffffff;
			--accent-green: #059669; 
			--border-green: #10b981;
			--shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
		}

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .marketplace-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* Marketplace Search Header */
        .search-header {
			background: var(--ui-white);
			padding: 24px;
			border-radius: 16px;
			box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
			margin-bottom: 20px;
			border: 1px solid var(--border-green); /* Added green border */
		}

        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-main {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
        }

        .search-main:focus {
            border-color: var(--accent-green);
            outline: none;
        }

        .btn-search {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-search:hover { background: #047857; }

        .filters-row {
            display: flex;
            gap: 15px;
            font-size: 14px;
        }

        .filter-group { display: flex; align-items: center; gap: 8px; }

        .filter-group input {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            width: 100px;
        }

        /* Scrollable List Area */
        .scroll-container {
			flex: 1;
			overflow-y: auto;
			background: transparent; /* Changed to show separation */
			border: none;
			padding: 5px;
		}

        .car-row {
			display: grid;
			grid-template-columns: 1fr 100px 120px 120px;
			align-items: center;
			padding: 16px;
			background: var(--ui-white);
			margin-bottom: 12px; /* Spacing between items */
			border-radius: 12px;
			border: 1px solid var(--border-soft);
			box-shadow: var(--shadow-sm);
			transition: all 0.2s ease; /* Responsiveness transition */
			cursor: pointer;
		}

        .car-row:hover {
			transform: translateY(-2px); /* Slight lift */
			border-color: var(--border-green);
			box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
			background: var(--green-light);
		}

        .car-name { font-weight: 600; font-size: 1.1em; }
		
        .car-sub { font-size: 12px; color: #64748b; }

		.roi-pill {
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 6px 12px;
			border-radius: 50px; /* Pill shape */
			font-weight: 800;
			font-size: 14px;
			box-shadow: inset 0 1px 1px rgba(0,0,0,0.05);
			border-width: 1px;
			border-style: solid;
		}
		
        .roi-indicator {
            text-align: center;
            padding: 5px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 13px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            justify-content: center; align-items: center;
        }

        .modal-box {
            background: var(--ui-white);
            padding: 30px;
            border-radius: 20px;
            width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
    </style>
</head>
<body>
    <div class="marketplace-container">
        <header class="search-header">
            <div class="search-row">
                <input type="text" id="brandSearch" class="search-main" placeholder="Search by brand (e.g. Toyota, BMW)...">
                <button class="btn-search" onclick="executeSearch()">Search</button>
            </div>
            <div class="filters-row">
                <div class="filter-group">
                    <label>Max Price:</label>
                    <input type="number" id="priceFilter" placeholder="$">
                </div>
                <div class="filter-group">
                    <label>Min Year:</label>
                    <input type="number" id="yearFilter" placeholder="2015">
                </div>
            </div>
        </header>

        <div class="scroll-container" id="inventoryList">
            <!-- Items injected by JS -->
        </div>
    </div>

    <div id="itemModal" class="modal">
        <div class="modal-box">
            <h2 id="modalHeader" style="color: var(--accent-green)"></h2>
            <div id="modalContent"></div>
            <button onclick="hideModal()" style="margin-top: 20px; width: 100%; padding: 12px; border:none; background: #e2e8f0; border-radius: 8px; cursor:pointer;">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
