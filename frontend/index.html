<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS360 - Car Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: white;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00ffcc, #00cc99);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: #999;
            margin-bottom: 40px;
        }
        
        #cars {
            display: grid;
            gap: 15px;
        }
        
        .car {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #00ffcc;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .car:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0, 255, 204, 0.2);
        }
        
        .car strong {
            color: #00ffcc;
            font-size: 1.2rem;
        }
        
        .loading {
            text-align: center;
            color: #666;
            padding: 40px;
        }
        
        .error {
            background: #ff4444;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Car Search</h1>
	<div id="cars" class="loading">Loading...</div>
    <script src="script.js"></script>
</body>
</html>
