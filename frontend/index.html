<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Flip Marketplace</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="marketplace-container">
        <div class="header-controls">
            <h2 style="margin:0;">Car Flip Dashboard</h2>
            <button class="theme-toggle" id="themeToggleBtn">Toggle Theme</button>
        </div>

        <header class="search-header">
            <div class="search-grid">
                <div class="input-group"><label>Make</label><input type="text" id="makeSearch" placeholder="Toyota, Honda..."></div>
                <div class="input-group"><label>Model</label><input type="text" id="modelSearch" placeholder="Camry, Civic..."></div>
                <div class="input-group"><label>Max Price</label><input type="number" id="maxPrice" placeholder="20000"></div>
            </div>
            <div class="action-row">
                <button class="btn-search" id="searchBtn">Search Inventory</button>
            </div>
        </header>

        <div class="sort-controls">
            <label>Sort Results:</label>
            <select id="frontendSortBy">
                <option value="roi">ROI %</option>
                <option value="net_profit">Net Profit</option>
                <option value="price">Purchase Price</option>
            </select>
            <select id="frontendSortOrder">
                <option value="desc">Highest First</option>
                <option value="asc">Lowest First</option>
            </select>
        </div>

        <div id="inventoryList"></div>
    </div>

    <div id="itemModal" class="modal">
        <div class="modal-box">
            <h2 id="modalHeader" style="color: var(--accent-green); margin-top:0;"></h2>
            <div id="modalContent"></div>
            <button id="closeModalBtn" style="margin-top: 20px; width: 100%; padding: 12px; border:none; background: #e2e8f0; border-radius: 8px; cursor:pointer; font-weight: 600;">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
